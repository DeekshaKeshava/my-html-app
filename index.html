<!DOCTYPE html>
<html>
<head>
    <title>My HTML App</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #f0f8ff;
        }
        h1 {
            color: green;
        }
        p {
            font-size: 18px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Hello from Jenkins CI/CD 🚀</h1>
    <p>This page is deployed using Git + Jenkins pipeline</p>

    <button onclick="showMessage()">Click Me</button>

    <script>
        function showMessage() {
            alert("Pipeline is working successfully!");
        }
    </script>

</body>
</html>
